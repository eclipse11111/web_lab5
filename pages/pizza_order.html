<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення піци</title>
</head>
<body>
<h2>Форма замовлення піци</h2>
<p>
    <a href="../index.html">Перейти до реєстрації студента</a> | 
    <a href="admin_panel.html">Перейти до адмін-панелі</a>
</p>
<form action="/pizza-order" method="POST">
    <fieldset>
        <legend>Оберіть розмір піци:</legend>
        <input type="radio" id="small" name="size" value="small" required>
        <label for="small">Мала</label>
        <input type="radio" id="medium" name="size" value="medium">
        <label for="medium">Середня</label>
        <input type="radio" id="large" name="size" value="large">
        <label for="large">Велика</label>
    </fieldset>

    <fieldset>
        <legend>Додаткові інгредієнти:</legend>
        <input type="checkbox" id="cheese" name="extras" value="cheese">
        <label for="cheese">Додатковий сир</label>
        <input type="checkbox" id="mushrooms" name="extras" value="mushrooms">
        <label for="mushrooms">Гриби</label>
        <input type="checkbox" id="pepperoni" name="extras" value="pepperoni">
        <label for="pepperoni">Пепероні</label>
        <input type="checkbox" id="olives" name="extras" value="olives">
        <label for="olives">Оливки</label>
        <input type="checkbox" id="bacon" name="extras" value="bacon">
        <label for="bacon">Бекон</label>
    </fieldset>

    <div>
        <label for="address">Адреса доставки:</label>
        <input type="text" id="address" name="address" required>
    </div>

    <div>
        <label for="phone">Контактний телефон:</label>
        <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="+380XXXXXXXXX"
            pattern="\+380[0-9]{9}" 
            required>
    </div>
    <div>
        <button type="submit">Замовити піцу</button>
        <button type="reset">Очистити</button>
    </div>
</form>
</body>
</html>
